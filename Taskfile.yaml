version: "3"

tasks:
  cursor:
    cmds:
      - agent --yolo

  lint:
    run: once
    cmd: bun eslint .
    sources:
      - bun.lock
      - eslint.config.ts
      - "**/*.ts"
      - "**/*.astro"
      - "**/*.mdx"
      - exclude: dist/**/*
      - exclude: node_modules/**/*

  lint:fix:
    cmd: bun eslint . --fix

  typecheck:src:
    run: once
    cmd: bun astro check --tsconfig src/tsconfig.json
    sources:
      - bun.lock
      - src/**/*

  typecheck:tooling:
    run: once
    cmd: bun tsc -p tsconfig.json
    sources:
      - bun.lock
      - "**/*.ts"
      - exclude: src/**/*
      - exclude: dist/**/*
      - exclude: node_modules/**/*

  dev:
    cmd: bun astro dev

  build:
    run: once
    cmds:
      - rm -rf dist/
      - bun astro build
    sources:
      - bun.lock
      - astro.config.ts
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*

  test:e2e:
    run: once
    deps:
      - build
    cmds:
      - bun playwright install chromium
      - bun playwright test
    sources:
      - bun.lock
      - "dist/**/*"
      - "e2e/**/*"

  test:unit:
    run: once
    cmd: bun test
    sources:
      - bun.lock
      - "src/**/*.ts"

  test:
    run: once
    deps:
      - test:unit
      - test:e2e

  check-impl:
    run: once
    deps:
      - lint
      - typecheck:src
      - typecheck:tooling
      - test

  check:
    run: once
    cmds:
      - bun i
      - task: check-impl

  deploy:
    deps:
      - check
    cmds:
      - bun wrangler pages deploy dist/
    sources:
      - bun.lock
      - dist/**/*
