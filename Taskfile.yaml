version: "3"

tasks:
  cursor:
    cmds:
      - agent --yolo

  lint-src:
    run: once
    cmds:
      - bun oxlint src/
    sources:
      - src/**/*

  lint-tooling:
    run: once
    cmds:
      - bun oxlint . --ignore-pattern 'src/**'
    sources:
      - "**/*.ts"
      - exclude: "src/**/*"
      - exclude: "node_modules/**/*"

  lint:
    run: once
    deps:
      - lint-src
      - lint-tooling

  typecheck-src:
    run: once
    cmds:
      - bun astro check --tsconfig src/tsconfig.json
    sources:
      - src/**/*

  typecheck-tooling:
    run: once
    cmds:
      - bun tsc -p tsconfig.json
    sources:
      - "**/*.ts"
      - exclude: "src/**/*"
      - exclude: "node_modules/**/*"

  typecheck:
    run: once
    deps:
      - typecheck-src
      - typecheck-tooling

  test-src:
    run: once
    cmds:
      - bun test src/
    sources:
      - src/**/*

  test-tooling:
    run: once
    cmds:
      - bun test scripts/
    sources:
      - "scripts/**/*"

  test:
    run: once
    deps:
      - test-src
      - test-tooling

  test-coverage:
    run: once
    cmds:
      - bun test --coverage
    sources:
      - "**/*.ts"
      - exclude: "e2e/**/*"
      - exclude: "node_modules/**/*"

  dev:
    cmds:
      - bun astro dev

  check-src:
    run: once
    deps:
      - lint-src
      - typecheck-src
      - test-src
    sources:
      - src/**/*

  check:
    run: once
    deps:
      - lint
      - typecheck
      - test

  build:
    run: once
    deps:
      - check
    cmds:
      - rm -rf dist/
      - bun astro build
    sources:
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*

  test-e2e:
    run: once
    deps:
      - build
    cmds:
      - bun test e2e/
    sources:
      - dist/**/*
      - e2e/**/*

  deploy:
    deps:
      - test-e2e
    cmds:
      - bun wrangler pages deploy dist/
    sources:
      - dist/**/*
