version: "3"

tasks:
  lint:
    run: once
    cmd: bun eslint .
    sources:
      - bun.lock
      - "*.ts"
      - e2e/**/*.ts
      - eslint/**/*.ts
      - src/**/*

  lint:fix:
    cmd: bun eslint . --fix

  typecheck:src:
    run: once
    cmd: bun astro check --tsconfig src/tsconfig.json
    sources:
      - bun.lock
      - src/**/*

  typecheck:tooling:
    run: once
    cmd: bun tsc -p tsconfig.json
    sources:
      - bun.lock
      - "*.ts"
      - src/**/*.ts
      - eslint/**/*.ts

  dev:
    cmd: bun astro dev

  favicon:png:
    cmd: pkgx rsvg-convert --width 512 --height 512 --format png --output src/assets/favicon.png src/assets/favicon.svg
    sources:
      - src/assets/favicon.svg
    generates:
      - src/assets/favicon.png

  build:
    run: once
    cmds:
      - rm -rf dist/
      - bun astro build
    sources:
      - bun.lock
      - astro.config.ts
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*

  test:e2e:
    run: once
    deps:
      - build
    cmds:
      - bun playwright install chromium
      - bun playwright test
    sources:
      - playwright.config.ts
      - bun.lock
      - "dist/**/*"
      - "e2e/**/*"

  test:unit:
    run: once
    cmd: bun test
    sources:
      - bun.lock
      - "src/**/*.ts"

  test:
    run: once
    deps:
      - test:unit
      - test:e2e

  check-impl:
    run: once
    deps:
      - lint
      - typecheck:src
      - typecheck:tooling
      - test

  check:
    run: once
    cmds:
      - bun i
      - task: check-impl

  deploy:
    deps:
      - check
    cmd: bun wrangler pages deploy dist/ --commit-dirty=true
    sources:
      - bun.lock
      - Taskfile.yaml
      - dist/**/*
