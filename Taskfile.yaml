version: "3"

includes:
  vite-static-site:
    taskfile: ../vite-static-site/Taskfile.yaml
    dir: ../vite-static-site

tasks:
  lint:
    run: once
    cmd: nubx oxlint .
    sources:
      - .oxlintrc.jsonc
      - nub.lock
      - "*.ts"
      - e2e/**/*.ts
      - scripts/**/*.ts
      - src/**/*
      - tooling/**/*.ts

  lint:fix:
    cmd: nubx oxlint . --fix

  typecheck:
    run: once
    deps:
      - vite-static-site:build
    cmd: nubx tsc -p tsconfig.json
    sources:
      - nub.lock
      - "*.ts"
      - e2e/**/*.ts
      - scripts/**/*.ts
      - src/**/*
      - tooling/**/*.ts

  dev:
    deps:
      - vite-static-site:build
    cmd: nubx vite --config vite.config.ts

  favicon:png:
    cmd: pkgx rsvg-convert --width 512 --height 512 --format png --output src/assets/favicon.png src/assets/favicon.svg
    sources:
      - src/assets/favicon.svg
    generates:
      - src/assets/favicon.png

  build:
    run: once
    deps:
      - vite-static-site:build
    cmd: DIST_DIR=dist nubx vite build --config vite.config.ts
    sources:
      - nub.lock
      - vite.config.ts
      - ../vite-static-site/package.json
      - ../vite-static-site/src/**/*
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*

  build:vite:
    run: once
    deps:
      - vite-static-site:build
    cmd: nubx vite build --config vite.config.ts
    sources:
      - nub.lock
      - vite.config.ts
      - ../vite-static-site/package.json
      - ../vite-static-site/src/**/*
      - src/**/*
      - public/**/*
    generates:
      - dist-vite/**/*

  test:e2e:
    run: once
    deps:
      - build
      - playwright:install
    env:
      DIST_DIR: dist
    cmd: nubx playwright test e2e/e2e.playwright.ts
    sources:
      - Taskfile.yaml
      - playwright.config.ts
      - nub.lock
      - "dist/**/*"
      - "e2e/**/*"

  test:e2e:dist-vite:
    run: once
    deps:
      - build:vite
      - playwright:install
    env:
      DIST_DIR: dist-vite
    cmd: nubx playwright test e2e/e2e.playwright.ts
    sources:
      - Taskfile.yaml
      - playwright.config.ts
      - nub.lock
      - "dist-vite/**/*"
      - "e2e/**/*"

  test:e2e:dev:
    run: once
    deps:
      - playwright:install
    env:
      SITE_URL: http://127.0.0.1:4321
    cmd: >-
      nub scripts/with-dev-server.ts
      nubx playwright test e2e/e2e.playwright.ts
    sources:
      - Taskfile.yaml
      - playwright.config.ts
      - nub.lock
      - e2e/**/*
      - scripts/with-dev-server.ts
      - ../vite-static-site/package.json
      - ../vite-static-site/src/**/*
      - src/**/*

  playwright:install:
    run: once
    cmd: nubx playwright install chromium
    sources:
      - nub.lock

  test:unit:
    run: once
    cmd: nubx vitest run
    sources:
      - nub.lock
      - "src/**/*.ts"
      - tooling/**/*.test.ts

  test:
    run: once
    deps:
      - test:unit
      - test:e2e:dist-vite
      - test:e2e:dev

  check-impl:
    run: once
    deps:
      - lint
      - typecheck
      - test

  check:
    run: once
    deps:
      - vite-static-site:build
    cmds:
      - nub install
      - task: check-impl

  deploy:
    deps:
      - build
      - check
    cmd: nubx wrangler pages deploy dist/ --commit-dirty=true
    sources:
      - nub.lock
      - Taskfile.yaml
      - dist/**/*
